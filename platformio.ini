; platformio.ini  (root — workspace only, no env here)
[platformio]
projects_dir = server, car, client, referee

[common_esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -std=gnu++17
lib_extra_dirs = ../lib

[common_esp8266]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
build_flags =
    -std=gnu++17
    -D ESPNOW_CHANNEL=6
    -D ROUNDS_TO_WIN=2
lib_extra_dirs = ../lib
