[platformio]
extra_configs = ../platformio.ini

; A D1 Mini has only one ADC pin, so a joystick's two axes are split across
; two physical client devices — flash one as client_throttle and one as
; client_steering, both wired to the same joystick module (shared GND/VCC,
; X wiper -> steering unit's A0, Y wiper -> throttle unit's A0).
;
; DEVICE_ID identifies the *logical controller*, not the physical unit: both
; halves of controller 1 are flashed with DEVICE_ID=1 (shown as "Ctrl #1A"
; and "Ctrl #1B" on the referee) — override BOTH to the same new number per
; additional controller pair (e.g. DEVICE_ID=2 for controller 2's two units).

[env:client_throttle]
extends = common_esp8266
build_flags =
    ${common_esp8266.build_flags}
    -D ROLE_CLIENT
    -D CLIENT_AXIS_THROTTLE
    -D DEVICE_ID=1  ; override per controller pair at flash time

[env:client_steering]
extends = common_esp8266
build_flags =
    ${common_esp8266.build_flags}
    -D ROLE_CLIENT
    -D CLIENT_AXIS_STEERING
    -D DEVICE_ID=1  ; override per controller pair at flash time (match the throttle half's ID)
