[platformio]
extra_configs = ../platformio.ini

[env:server]
extends = common_esp8266
build_flags =
    ${common_esp8266.build_flags}
    -D ROLE_SERVER

; Auto-pairs + auto-starts + cycles LED commands, for end-to-end comms testing.
[env:server_selftest]
extends = common_esp8266
build_flags =
    ${common_esp8266.build_flags}
    -D ROLE_SERVER
    -D COMMS_SELFTEST

; Real status LED strip + buzzer driven from game state (WS2812 on pin 2, buzzer D8).
[env:server_strip]
extends = common_esp8266
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0
build_flags =
    ${common_esp8266.build_flags}
    -D ROLE_SERVER
    -D STATUS_STRIP_NEOPIXEL
    -D STATUS_STRIP_PIN=2
    -D STATUS_STRIP_LEDS=150

[env:native_test]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -I../lib/blahaj_common
    -Isrc
    -D ROUNDS_TO_WIN=2
lib_extra_dirs = ../lib
build_src_filter = -<*> +<game_engine.cpp>
test_build_src = yes
