[platformio]
extra_configs = ../platformio.ini

[env:car]
extends = common_esp8266
build_flags =
    ${common_esp8266.build_flags}
    -D ROLE_CAR
    -D KNOCKOFF_LOCKOUT_MS=3000
    -D WATCHDOG_TIMEOUT_MS=500
    -D DEVICE_ID=1  ; override per device at flash time

; Comms-verification build: no DRV8833 wired, motor commands logged to serial.
[env:car_logtest]
extends = common_esp8266
build_flags =
    ${common_esp8266.build_flags}
    -D ROLE_CAR
    -D MOTOR_LOG_ONLY
    -D KNOCKOFF_LOCKOUT_MS=3000
    -D WATCHDOG_TIMEOUT_MS=500
    -D DEVICE_ID=1
